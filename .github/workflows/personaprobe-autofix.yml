name: PersonaProbe Autofix

on:
  workflow_dispatch:
    inputs:
      fix_context_url:
        description: Signed PersonaProbe fix-context URL
        required: true
        type: string
      fix_attempt_id:
        description: PersonaProbe FixAttempt ID
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: PersonaProbe Autofix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Create autofix branch
        run: git switch -c "personaprobe/fix-${{ github.run_id }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch PersonaProbe fix context
        env:
          FIX_CONTEXT_URL: ${{ inputs.fix_context_url }}
        run: |
          set -euo pipefail

          normalized_url=$(node -e '
            const value = String(process.env.FIX_CONTEXT_URL || "").trim();
            const prefixedMarkdown = value.match(/^https?:\/\/\[[^\]]+\]\((https?:\/\/[^)\s]+)\)(.*)$/i);
            const markdown = value.match(/^\[[^\]]+\]\((https?:\/\/[^)\s]+)\)(.*)$/i);
            const match = prefixedMarkdown || markdown;
            let normalized = value;
            if (match) {
              const base = match[1].replace(/\/$/, "");
              const suffix = String(match[2] || "");
              normalized = suffix ? `${base}${suffix.startsWith("/") ? suffix : `/${suffix}`}` : base;
            }
            normalized = normalized.replace(/^<|>$/g, "").trim();
            if (!/^https?:\/\//i.test(normalized) && /^[a-z0-9.-]+(?::\d+)?(?:\/.*)?$/i.test(normalized)) {
              normalized = `https://${normalized}`;
            }
            try {
              const url = new URL(normalized);
              if (url.protocol !== "http:" && url.protocol !== "https:") throw new Error("Expected http(s)");
              console.log(url.toString());
            } catch {
              console.error("Invalid PersonaProbe fix_context_url. Expected a plain http(s) URL.");
              process.exit(1);
            }
          ')

          echo "::add-mask::$normalized_url"
          curl --fail --location --silent --show-error "$normalized_url" --output fix-context.json

          if ! jq -e . fix-context.json > /dev/null; then
            echo "::error::PersonaProbe fix context response was not JSON. Check that PERSONAPROBE_APP_URL points to the public PersonaProbe deployment and that the signed fix-context URL includes /api/fix-context/..."
            echo "Response preview:"
            head -c 500 fix-context.json | tr "\n" " "
            echo
            exit 1
          fi

          callback_url=$(jq -r '.callback.url // ""' fix-context.json)
          callback_token=$(jq -r '.callback.bearerToken // ""' fix-context.json)

          if [ -n "$callback_token" ]; then
            echo "::add-mask::$callback_token"
          fi

          {
            echo "PERSONAPROBE_CALLBACK_URL=$callback_url"
            echo "PERSONAPROBE_CALLBACK_TOKEN=$callback_token"
          } >> "$GITHUB_ENV"

          if [ -n "$callback_url" ] && [ -n "$callback_token" ]; then
            body=$(jq -n \
              --arg status "CONTEXT_FETCHED" \
              --arg runId "$GITHUB_RUN_ID" \
              --arg runUrl "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
              '{
                status: $status,
                githubWorkflowRunId: $runId,
                evidence: {
                  workflowRunUrl: $runUrl
                }
              }')

            curl --fail --silent --show-error \
              --request POST \
              --header "Authorization: Bearer $callback_token" \
              --header "Content-Type: application/json" \
              --data "$body" \
              "$callback_url" || true
          fi

      - name: Run PersonaProbe autofix
        id: autofix
        continue-on-error: true
        env:
          PERSONAPROBE_FIX_ATTEMPT_ID: ${{ inputs.fix_attempt_id }}
          PERSONAPROBE_AGENT_COMMAND: ${{ vars.PERSONAPROBE_AGENT_COMMAND }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run personaprobe:autofix -- fix-context.json

      - name: Ensure PR artifacts exist
        if: always()
        run: |
          if [ ! -s personaprobe-autofix-prompt.md ]; then
            {
              echo "# PersonaProbe Autofix Prompt"
              echo
              echo "The autofix workflow did not produce a prompt. Review the workflow logs before merging."
            } > personaprobe-autofix-prompt.md
          fi

          if [ ! -s pr-body.md ]; then
            {
              echo "## PersonaProbe Autofix"
              echo
              echo "This is an automatically generated draft PR and must be reviewed before merging. It will not be auto-merged."
              echo
              echo "### Autofix status"
              echo "The autofix workflow did not produce a PR body. Review the workflow logs before merging."
              echo
              echo "Generated prompt: \`personaprobe-autofix-prompt.md\`"
            } > pr-body.md
          fi

      - name: Run lint if available
        continue-on-error: true
        run: npm run --if-present lint

      - name: Run tests if available
        continue-on-error: true
        run: npm run --if-present test

      - name: Run build if available
        continue-on-error: true
        run: npm run --if-present build

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git reset -- fix-context.json

          if git diff --cached --quiet; then
            git commit --allow-empty -m "Add PersonaProbe autofix draft"
          else
            git commit -m "Add PersonaProbe autofix draft"
          fi

      - name: Push autofix branch
        run: git push --set-upstream origin "personaprobe/fix-${{ github.run_id }}"

      - name: Create draft PR
        id: create_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_url=$(gh pr create \
            --draft \
            --base "${{ github.event.repository.default_branch }}" \
            --head "personaprobe/fix-${{ github.run_id }}" \
            --title "Fix UI-agent failure detected by PersonaProbe" \
            --body-file pr-body.md)

          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Report PersonaProbe PR
        if: success()
        env:
          CALLBACK_TOKEN: ${{ env.PERSONAPROBE_CALLBACK_TOKEN }}
          CALLBACK_URL: ${{ env.PERSONAPROBE_CALLBACK_URL }}
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
        run: |
          if [ -z "$CALLBACK_URL" ] || [ -z "$CALLBACK_TOKEN" ] || [ -z "$PR_URL" ]; then
            exit 0
          fi

          commit_sha=$(git rev-parse HEAD)
          body=$(jq -n \
            --arg status "PR_OPENED" \
            --arg prUrl "$PR_URL" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg runUrl "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg branch "personaprobe/fix-${GITHUB_RUN_ID}" \
            --arg commitSha "$commit_sha" \
            '{
              status: $status,
              prUrl: $prUrl,
              githubWorkflowRunId: $runId,
              evidence: {
                workflowRunUrl: $runUrl,
                branch: $branch,
                commitSha: $commitSha
              }
            }')

          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $CALLBACK_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$body" \
            "$CALLBACK_URL" || true

      - name: Report PersonaProbe failure
        if: failure()
        env:
          CALLBACK_TOKEN: ${{ env.PERSONAPROBE_CALLBACK_TOKEN }}
          CALLBACK_URL: ${{ env.PERSONAPROBE_CALLBACK_URL }}
        run: |
          if [ -z "$CALLBACK_URL" ] || [ -z "$CALLBACK_TOKEN" ]; then
            exit 0
          fi

          body=$(jq -n \
            --arg status "FAILED" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg runUrl "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg errorMessage "PersonaProbe autofix workflow failed before opening a draft PR." \
            '{
              status: $status,
              githubWorkflowRunId: $runId,
              errorMessage: $errorMessage,
              evidence: {
                workflowRunUrl: $runUrl
              }
            }')

          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $CALLBACK_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$body" \
            "$CALLBACK_URL" || true
