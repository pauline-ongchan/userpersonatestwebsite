<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UserPersona Demo Website - Self-Healed</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #ffffff;
        color: #17202a;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        min-height: 100vh;
      }

      .wrap {
        width: min(100% - 40px, 760px);
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      .eyebrow {
        margin: 0;
        color: #3c6e47;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 8px 0 0;
        font-size: 32px;
      }

      form,
      .success {
        margin-top: 32px;
        border: 1px solid #d7dee8;
        border-radius: 8px;
        padding: 20px;
      }

      label {
        display: block;
      }

      .label {
        display: block;
        color: #334155;
        font-size: 14px;
        font-weight: 800;
      }

      input[type="email"] {
        width: 100%;
        margin-top: 8px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 12px;
        color: #17202a;
        font: inherit;
      }

      .choice {
        display: flex;
        min-height: 52px;
        align-items: flex-start;
        gap: 12px;
        margin-top: 20px;
        border: 1px solid #d7dee8;
        border-radius: 8px;
        background: #f5f7fa;
        padding: 12px;
      }

      .choice input {
        width: 20px;
        height: 20px;
        margin-top: 2px;
      }

      .choice-title {
        display: block;
        font-size: 14px;
        font-weight: 800;
      }

      .choice-copy {
        display: block;
        margin-top: 4px;
        color: #64748b;
        font-size: 14px;
      }

      .error {
        display: none;
        margin-top: 20px;
        border: 1px solid rgba(207, 95, 69, 0.35);
        border-radius: 8px;
        background: rgba(207, 95, 69, 0.1);
        color: #cf5f45;
        font-size: 14px;
        font-weight: 800;
        padding: 10px 12px;
      }

      button {
        width: 100%;
        min-height: 48px;
        margin-top: 20px;
        border: 0;
        border-radius: 6px;
        background: #17202a;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        padding: 12px 16px;
      }

      input:focus,
      button:focus {
        outline: 2px solid #17202a;
        outline-offset: 2px;
      }

      .success {
        border-color: rgba(60, 110, 71, 0.35);
        background: rgba(60, 110, 71, 0.07);
      }

      .success-icon {
        width: 40px;
        height: 40px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: #3c6e47;
        color: white;
        font-weight: 900;
      }

      @media (min-width: 720px) {
        button {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="wrap">
        <p class="eyebrow">Self-healed demo</p>
        <h1>Update account email</h1>

        <form>
          <label>
            <span class="label">Account email</span>
            <input
              id="account-email"
              data-testid="account-email"
              aria-label="Account email"
              type="email"
              inputmode="email"
              placeholder="test@example.com"
            />
          </label>

          <label class="choice">
            <input id="newsletter-checkbox" data-testid="newsletter-checkbox" type="checkbox" />
            <span>
              <span class="choice-title">Optional product newsletter</span>
              <span class="choice-copy">Off by default.</span>
            </span>
          </label>

          <p id="error" class="error"></p>

          <button id="save-preferences" data-testid="save-preferences" type="button">Update account email</button>
        </form>
      </section>
    </main>

    <script>
      const accountEmail = document.querySelector("#account-email");
      const error = document.querySelector("#error");

      document.querySelector("#save-preferences").addEventListener("click", () => {
        const accountValue = accountEmail.value.trim();

        if (accountValue && !isValidEmail(accountValue)) {
          error.style.display = "block";
          error.textContent = "Email is wrong. Enter a valid account email address.";
          return;
        }

        if (accountValue !== "test@example.com") {
          error.style.display = "block";
          error.textContent = "Account email was not changed. Enter test@example.com in the Account email field.";
          return;
        }

        document.body.innerHTML = `
          <main>
            <section class="wrap">
              <div class="success">
                <div class="success-icon">✓</div>
                <h1>Account email changed successfully</h1>
                <p class="choice-copy">The account email is now ${escapeHtml(accountValue)}.</p>
              </div>
            </section>
          </main>
        `;
      });

      function isValidEmail(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
