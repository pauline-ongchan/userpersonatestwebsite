<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UserPersona Demo Website</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #64748b;
        --line: #d7dee8;
        --soft: #f5f7fa;
        --moss: #3c6e47;
        --coral: #cf5f45;
        --amber: #d89a2b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #ffffff;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        min-height: 100vh;
      }

      .wrap {
        width: min(100% - 40px, 1120px);
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .layout {
        display: grid;
        grid-template-columns: 0.72fr 1.28fr;
        gap: 32px;
        align-items: start;
      }

      .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 8px 0 0;
        font-size: 32px;
        line-height: 1.15;
      }

      h2 {
        margin: 0;
        font-size: 18px;
      }

      .side {
        display: grid;
        gap: 16px;
      }

      .hint,
      .error,
      .success {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
      }

      .hint {
        background: var(--soft);
        color: #475569;
      }

      .error {
        display: none;
        border-color: rgba(207, 95, 69, 0.35);
        background: rgba(207, 95, 69, 0.1);
        color: var(--coral);
        font-weight: 700;
      }

      form {
        display: grid;
        gap: 28px;
      }

      section,
      .modal-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
      }

      label {
        display: block;
      }

      .label {
        display: block;
        color: #334155;
        font-size: 14px;
        font-weight: 700;
      }

      input[type="email"],
      input[type="tel"],
      input[type="search"] {
        width: 100%;
        margin-top: 8px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 12px;
        color: var(--ink);
        font: inherit;
      }

      input:focus,
      button:focus {
        outline: 2px solid var(--ink);
        outline-offset: 2px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-top: 16px;
      }

      .choice {
        display: flex;
        min-height: 64px;
        align-items: flex-start;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
        padding: 12px;
      }

      .choice input {
        width: 20px;
        height: 20px;
        margin-top: 2px;
      }

      .choice-title {
        display: block;
        font-size: 14px;
        font-weight: 700;
      }

      .choice-copy,
      .help {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .save-row {
        padding-top: 16px;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 12px 16px;
        color: inherit;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        background: var(--ink);
        color: white;
      }

      .secondary {
        border: 1px solid #cbd5e1;
        background: white;
      }

      .success-screen {
        width: min(100% - 40px, 720px);
        margin: 0 auto;
        padding: 64px 0;
      }

      .success {
        border-color: rgba(60, 110, 71, 0.35);
        background: rgba(60, 110, 71, 0.07);
      }

      .success h1 {
        margin-top: 16px;
      }

      .success-icon {
        width: 40px;
        height: 40px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: var(--moss);
        color: white;
        font-weight: 900;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 16px;
        background: rgba(23, 32, 42, 0.42);
      }

      .modal-card {
        width: min(100%, 560px);
        background: white;
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.24);
      }

      .modal-head {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }

      .modal-icon {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        flex: none;
        background: rgba(216, 154, 43, 0.18);
        color: #8a5a00;
        font-weight: 900;
      }

      .modal-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 20px;
      }

      @media (max-width: 760px) {
        .wrap {
          width: min(100% - 28px, 420px);
          padding-top: 24px;
        }

        .layout,
        .grid-2 {
          grid-template-columns: 1fr;
        }

        form {
          gap: 24px;
        }

        .save-row {
          padding-top: 360px;
        }

        .primary {
          width: 100%;
          min-height: 48px;
        }
      }
    </style>
  </head>
  <body>
    <main id="app">
      <div class="wrap">
        <div class="layout">
          <aside class="side">
            <div>
              <p class="eyebrow">Settings</p>
              <h1>Account settings</h1>
            </div>

            <label>
              <span class="label">Find a setting</span>
              <input
                id="settings-search"
                data-testid="settings-search"
                aria-label="Search settings"
                type="search"
                placeholder="Search"
              />
            </label>

            <p id="search-hint" class="hint">General, billing, privacy, and contact settings</p>
          </aside>

          <form>
            <section>
              <h2>Billing contact</h2>
              <label style="margin-top: 16px">
                <span class="label">Billing email</span>
                <input
                  id="billing-email"
                  data-testid="billing-email"
                  type="email"
                  inputmode="email"
                  placeholder="receipts@example.com"
                />
                <span class="help">Used for invoice copies.</span>
              </label>
            </section>

            <section>
              <h2>Profile contact</h2>
              <div class="grid-2">
                <label>
                  <span class="label">Account email</span>
                  <input
                    id="account-email"
                    data-testid="account-email"
                    aria-label="Account email"
                    type="email"
                    inputmode="email"
                    placeholder="account@example.com"
                  />
                </label>
                <label>
                  <span class="label">Phone number</span>
                  <input
                    id="phone-number"
                    data-testid="phone-number"
                    aria-label="Optional phone number"
                    type="tel"
                    inputmode="tel"
                    placeholder="Optional"
                  />
                </label>
              </div>
            </section>

            <section>
              <h2>Communication choices</h2>
              <label class="choice" style="margin-top: 16px">
                <input id="newsletter-checkbox" data-testid="newsletter-checkbox" type="checkbox" checked />
                <span>
                  <span class="choice-title">Keep me in the loop</span>
                  <span class="choice-copy">Receive product news and partner updates.</span>
                </span>
              </label>
            </section>

            <section>
              <h2>Privacy defaults</h2>
              <div style="display: grid; gap: 12px; margin-top: 16px">
                <label class="choice">
                  <input id="tracking-checkbox" data-testid="tracking-checkbox" type="checkbox" checked />
                  <span>
                    <span class="choice-title">Personalized product tracking</span>
                    <span class="choice-copy">Use activity data to tune recommendations.</span>
                  </span>
                </label>
                <label class="choice">
                  <input id="research-checkbox" data-testid="research-checkbox" type="checkbox" checked />
                  <span>
                    <span class="choice-title">Permission for research follow-up</span>
                    <span class="choice-copy">Allow occasional requests for extra feedback.</span>
                  </span>
                </label>
              </div>
            </section>

            <p id="error" class="error"></p>

            <div class="save-row">
              <button id="save-preferences" data-testid="save-preferences" class="primary" type="button">
                Save preferences
              </button>
            </div>
          </form>
        </div>
      </div>

      <div id="privacy-modal" class="modal" role="dialog" aria-modal="true">
        <section class="modal-card">
          <div class="modal-head">
            <span class="modal-icon">!</span>
            <div>
              <h2>Before saving preferences</h2>
              <p class="choice-copy">
                Optional permissions help personalize emails and let the team request follow-up feedback.
              </p>
            </div>
          </div>

          <div style="display: grid; gap: 12px; margin-top: 16px">
            <label class="choice">
              <input id="modal-tracking" type="checkbox" checked readonly />
              <span class="choice-title">Allow product tracking</span>
            </label>
            <label class="choice">
              <input id="modal-research" type="checkbox" checked readonly />
              <span class="choice-title">Allow research follow-up</span>
            </label>
          </div>

          <div class="modal-actions">
            <button id="modal-reject" data-testid="modal-reject" class="secondary" type="button">
              Use essentials only
            </button>
            <button id="modal-allow" data-testid="modal-allow" class="primary" type="button">Looks fine</button>
          </div>
        </section>
      </div>
    </main>

    <script>
      const $ = (selector) => document.querySelector(selector);

      const search = $("#settings-search");
      const hint = $("#search-hint");
      const billingEmail = $("#billing-email");
      const accountEmail = $("#account-email");
      const phone = $("#phone-number");
      const newsletter = $("#newsletter-checkbox");
      const tracking = $("#tracking-checkbox");
      const research = $("#research-checkbox");
      const modal = $("#privacy-modal");
      const error = $("#error");
      const saveButton = $("#save-preferences");
      const healPlan = decodeSelfHealPlan(new URLSearchParams(window.location.search).get("heal"));

      applySelfHealPlan(healPlan);

      document.addEventListener("keydown", (event) => {
        const target = event.target;
        const typing =
          target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement || target instanceof HTMLSelectElement;
        if (event.key === "/" && !typing) {
          event.preventDefault();
          search.focus();
        }
      });

      search.addEventListener("input", () => {
        const value = search.value.trim().toLowerCase();
        hint.textContent = value.includes("email")
          ? "Email appears in billing and account sections"
          : value
            ? "No exact match"
            : "General, billing, privacy, and contact settings";
      });

      $("#modal-reject")?.addEventListener("click", () => {
        tracking.checked = false;
        research.checked = false;
        $("#modal-tracking").checked = false;
        $("#modal-research").checked = false;
        modal.remove();
      });

      $("#modal-allow")?.addEventListener("click", () => {
        modal.remove();
      });

      saveButton.addEventListener("click", () => {
        const accountValue = accountEmail.value.trim();
        const billingValue = billingEmail.value.trim();

        if (phone.value && !/^\+?[0-9 ()-]{7,}$/.test(phone.value)) {
          showError("Phone number is wrong. Remove it or enter a valid phone number.");
          return;
        }

        if (accountValue && !isValidEmail(accountValue)) {
          showError("Email is wrong. Enter a valid account email address.");
          return;
        }

        if (billingValue && !isValidEmail(billingValue)) {
          showError("Email is wrong. Enter a valid billing email address.");
          return;
        }

        if (accountValue !== "test@example.com") {
          if (billingValue === "test@example.com") {
            showSuccess(
              "Billing address successfully changed",
              `The billing email address is now ${escapeHtml(billingValue)}. The account email was not changed.`
            );
            return;
          }

          showError("Account email was not changed. Enter test@example.com in the Account email field.");
          return;
        }

        showSuccess(
          "Email updated successfully",
          `The account email is now ${escapeHtml(accountValue)}. Billing notices will keep using ${escapeHtml(
            billingValue || "the existing billing contact"
          )}.`
        );
      });

      function showSuccess(title, message) {
        document.body.innerHTML = `
          <main>
            <section class="success-screen">
              <div class="success">
                <div class="success-icon">✓</div>
                <h1>${title}</h1>
                <p class="choice-copy">${message}</p>
              </div>
            </section>
          </main>
        `;
      }

      function isValidEmail(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
      }

      function applySelfHealPlan(plan) {
        if (!plan?.fixes) return;

        document.querySelector(".eyebrow").textContent = "Self-healed settings";

        if (plan.fixes.removeBillingEmailTrap) {
          billingEmail.closest("section").style.display = "none";
        }

        if (plan.fixes.removeOptionalPhoneField) {
          phone.value = "";
          phone.closest("label").style.display = "none";
          phone.closest(".grid-2").style.gridTemplateColumns = "1fr";
        }

        if (plan.fixes.removePermissionsModal) {
          tracking.checked = false;
          research.checked = false;
          modal.remove();
          tracking.closest("section").style.display = "none";
        }

        if (plan.fixes.newsletterDefaultChecked === false) {
          newsletter.checked = false;
        }

        if (plan.fixes.useExplicitAccountEmailCopy) {
          accountEmail.placeholder = "test@example.com";
        }

        if (plan.fixes.useExplicitSaveButton) {
          saveButton.textContent = "Update account email";
        }

        if (plan.fixes.keepSaveVisibleOnMobile) {
          document.querySelector(".save-row").style.paddingTop = "0";
        }
      }

      function decodeSelfHealPlan(encoded) {
        if (!encoded) return null;

        try {
          const normalized = encoded.replaceAll("-", "+").replaceAll("_", "/");
          const padded = `${normalized}${"=".repeat((4 - (normalized.length % 4)) % 4)}`;
          return JSON.parse(window.atob(padded));
        } catch {
          return null;
        }
      }

      function showError(message) {
        error.style.display = "block";
        error.textContent = message;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
