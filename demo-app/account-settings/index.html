<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UserPersona Demo Website</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #64748b;
        --line: #d7dee8;
        --soft: #f5f7fa;
        --moss: #3c6e47;
        --coral: #cf5f45;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #ffffff;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        min-height: 100vh;
      }

      .wrap {
        width: min(100% - 40px, 1120px);
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .layout {
        display: grid;
        grid-template-columns: 0.72fr 1.28fr;
        gap: 32px;
        align-items: start;
      }

      .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 8px 0 0;
        font-size: 32px;
        line-height: 1.15;
      }

      h2 {
        margin: 0;
        font-size: 18px;
      }

      .side {
        display: grid;
        gap: 16px;
      }

      .hint,
      .error,
      .success {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
      }

      .hint {
        background: var(--soft);
        color: #475569;
      }

      .error {
        display: none;
        border-color: rgba(207, 95, 69, 0.35);
        background: rgba(207, 95, 69, 0.1);
        color: var(--coral);
        font-weight: 700;
      }

      form {
        display: grid;
        gap: 28px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
      }

      label {
        display: block;
      }

      .label {
        display: block;
        color: #334155;
        font-size: 14px;
        font-weight: 700;
      }

      input[type="email"],
      input[type="search"] {
        width: 100%;
        margin-top: 8px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 12px;
        color: var(--ink);
        font: inherit;
      }

      input:focus,
      button:focus {
        outline: 2px solid var(--ink);
        outline-offset: 2px;
      }

      .choice {
        display: flex;
        min-height: 64px;
        align-items: flex-start;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
        padding: 12px;
      }

      .choice input {
        width: 20px;
        height: 20px;
        margin-top: 2px;
      }

      .choice-title {
        display: block;
        font-size: 14px;
        font-weight: 700;
      }

      .choice-copy,
      .help {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .save-row {
        padding-top: 16px;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 12px 16px;
        color: inherit;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        background: var(--ink);
        color: white;
      }

      .success-screen {
        width: min(100% - 40px, 720px);
        margin: 0 auto;
        padding: 64px 0;
      }

      .success {
        border-color: rgba(60, 110, 71, 0.35);
        background: rgba(60, 110, 71, 0.07);
      }

      .success h1 {
        margin-top: 16px;
      }

      .success-icon {
        width: 40px;
        height: 40px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: var(--moss);
        color: white;
        font-weight: 900;
      }

      @media (max-width: 760px) {
        .wrap {
          width: min(100% - 28px, 420px);
          padding-top: 24px;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        form {
          gap: 24px;
        }

        .primary {
          width: 100%;
          min-height: 48px;
        }
      }
    </style>
  </head>
  <body>
    <main id="app">
      <div class="wrap">
        <div class="layout">
          <aside class="side">
            <div>
              <p class="eyebrow">Settings</p>
              <h1>Account settings</h1>
            </div>

            <label>
              <span class="label">Find a setting</span>
              <input
                id="settings-search"
                data-testid="settings-search"
                aria-label="Search settings"
                type="search"
                placeholder="Search"
              />
            </label>

            <p id="search-hint" class="hint">Account and communication settings</p>
          </aside>

          <form>
            <section>
              <h2>Billing contact</h2>
              <label style="margin-top: 16px">
                <span class="label">Billing email address</span>
                <input
                  id="billing-email"
                  data-testid="billing-email"
                  aria-label="Billing email address"
                  type="email"
                  inputmode="email"
                  placeholder="receipts@example.com"
                />
                <span class="help">Used for billing notices, not account sign-in.</span>
              </label>
            </section>

            <section>
              <h2>Profile contact</h2>
              <label style="margin-top: 16px">
                <span class="label">Account email</span>
                <input
                  id="account-email"
                  data-testid="account-email"
                  aria-label="Account email"
                  type="email"
                  inputmode="email"
                  placeholder="test@example.com"
                />
              </label>
            </section>

            <section>
              <h2>Communication choices</h2>
              <label class="choice" style="margin-top: 16px">
                <input id="newsletter-checkbox" data-testid="newsletter-checkbox" type="checkbox" />
                <span>
                  <span class="choice-title">Optional product newsletter</span>
                  <span class="choice-copy">Off by default.</span>
                </span>
              </label>
            </section>

            <p id="error" class="error"></p>

            <div class="save-row">
              <button id="save-preferences" data-testid="save-preferences" class="primary" type="button">
                Update account email
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script>
      const $ = (selector) => document.querySelector(selector);

      const search = $("#settings-search");
      const hint = $("#search-hint");
      const billingEmail = $("#billing-email");
      const accountEmail = $("#account-email");
      const error = $("#error");
      const saveButton = $("#save-preferences");

      document.addEventListener("keydown", (event) => {
        const target = event.target;
        const typing =
          target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement || target instanceof HTMLSelectElement;
        if (event.key === "/" && !typing) {
          event.preventDefault();
          search.focus();
        }
      });

      search.addEventListener("input", () => {
        const value = search.value.trim().toLowerCase();
        hint.textContent = value.includes("email")
          ? "Email appears in billing and account sections"
          : value
            ? "No exact match"
            : "Account and communication settings";
      });

      saveButton.addEventListener("click", () => {
        const accountValue = accountEmail.value.trim();
        const billingValue = billingEmail.value.trim();

        if (accountValue && !isValidEmail(accountValue)) {
          showError("Email is wrong. Enter a valid account email address.");
          return;
        }

        if (billingValue && !isValidEmail(billingValue)) {
          showError("Email is wrong. Enter a valid billing email address.");
          return;
        }

        if (accountValue === "test@example.com") {
          showSuccess(
            "Account email changed successfully",
            `The account email is now ${escapeHtml(accountValue)}.`
          );
          return;
        }

        if (billingValue === "test@example.com") {
          showSuccess(
            "Billing address successfully changed",
            `The billing email address is now ${escapeHtml(billingValue)}. The account email was not changed.`
          );
          return;
        }

        showError("Account email was not changed. Enter test@example.com in the Account email field.");
      });

      function showSuccess(title, message) {
        document.body.innerHTML = `
          <main>
            <section class="success-screen">
              <div class="success">
                <div class="success-icon">✓</div>
                <h1>${title}</h1>
                <p class="choice-copy">${message}</p>
              </div>
            </section>
          </main>
        `;
      }

      function showError(message) {
        error.style.display = "block";
        error.textContent = message;
      }

      function isValidEmail(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
